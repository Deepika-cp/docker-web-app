<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Docker Project</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            overflow: hidden;
        }

        /* Background circles */
        .circle1,
        .circle2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
        }

        .circle1 {
            width: 300px;
            height: 300px;
            background: #00c6ff;
            top: -80px;
            left: -80px;
        }

        .circle2 {
            width: 350px;
            height: 350px;
            background: #ff4ecd;
            bottom: -100px;
            right: -100px;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 45px;
            text-align: center;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(255, 255, 255, 0.1);

            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            color: white;
            font-size: 42px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        p {
            color: #e0e0e0;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 17px;
            font-weight: bold;
            color: white;

            background: linear-gradient(45deg, #ff416c, #ff4b2b);

            transition: 0.4s ease;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.7);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="circle1"></div>
    <div class="circle2"></div>

    <div class="container">

        <div class="icon">🐳</div>

        <h1>Hello Deepika 👋</h1>

        <p>
            Welcome to my modern Docker + GitHub project.<br>
            This webpage is running successfully inside a Docker container.
        </p>

        <a href="#" class="btn">Explore Project</a>

    </div>

</body>

</html>
